<script>
const serviceData = {
  web: {
    mainTitle: "First Aid, Last Orders",
    content: [
      { type: "image", src: "assets/img/fa.jpg" },
      { 
        type: "text", 
        html: `On a cruise ship docked in Helsinki, a supervisor convinced he’s seriously ill drives his cleaning crew to distraction. One sharp-witted cleaner poses as a doctor, dishing out absurd cures while a surprise inspection hurtles closer. To survive the day, the immigrant crew must outwit the chaos before it sinks them all — a sharp-tongued modern farce inspired by Molière’s The Imaginary Invalid.<br><br>
        This professional stage production blends live theatre with real-time digital elements — streaming to online audiences, incorporating live video feeds from hidden corners of the ship, and letting viewers aboard and at home experience the same rising storm of comedy, panic, and survival from multiple perspectives.`
      }
    ]
  },

  software: {
    mainTitle: "Translucence",
    content: [
      { type: "image", src: "assets/img/translucence.jpeg" },
      { 
        type: "text", 
        html: `In a fractured future where Earth’s stability has long since crumbled, exiled scientist Dr. Mara Solberg rediscovers a forgotten innovation capable of sustaining life in the harshest of worlds. Her pursuit of this breakthrough draws the attention of powerful forces determined to erase it from history.<br><br>
        Translucence fuses live performance with real-time digital scenography, layered soundscapes, and cinematic world-building — where the physical stage merges seamlessly with a living, virtual environment that evolves with the story.`
      }
    ]
  },

  product: {
    mainTitle: "Eurojob",
    content: [
      { type: "image", src: "assets/img/eurojob.jpeg" },   // BEFORE
      { 
        type: "text", 
        html: `An online-born stage drama about pride, distance, and the fight to be heard.<br><br>
        A father. A son. One phone call. Six hours until eviction.<br><br>
        In a bedsit, a once-charismatic hustler whose quick wit and bravado now barely conceal his exhaustion and loneliness dials the number he’s avoided for years. What begins as a plea for help becomes a fierce duel over who has forgiven who the most—a raw, funny, and devastating argument that strips away decades of silence.<br><br>
        Written for one actor to deliver a virtuoso, multifaceted performance, the play demands every shade of the actor’s craft.`
      },
      { type: "image", src: "assets/img/ej2.jpeg" }        // AFTER
    ]
  }
};

const links = document.querySelectorAll(".services-list a");
const container = document.getElementById("service-content");

function renderService(key) {
  const data = serviceData[key];

  // Clear container
  container.innerHTML = "";

  // Title
  const title = document.createElement("h3");
  title.textContent = data.mainTitle;
  container.appendChild(title);

  // Structured rendering
  data.content.forEach(block => {
    if (block.type === "image") {
      const img = document.createElement("img");
      img.src = block.src;
      img.className = "img-fluid services-img";
      container.appendChild(img);
    }

    if (block.type === "text") {
      const p = document.createElement("p");
      p.innerHTML = block.html;
      container.appendChild(p);
    }
  });
}

// Click handling
links.forEach(link => {
  link.addEventListener("click", e => {
    e.preventDefault();

    links.forEach(l => l.classList.remove("active"));
    link.classList.add("active");

    renderService(link.dataset.service);
  });
});

// Initial render (default active)
renderService("web");
</script>
